name: rewrite-ci

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 19 * * *"

env:
  MERGIFY_QUEUE_METADATA_EDIT: ${{ github.event_name == 'pull_request' && github.event.action == 'edited' && startsWith(github.event.pull_request.head.ref, 'mergify/merge-queue/') }}

# Cancel superseded ordinary PR runs (e.g. after a force-push). Never cancel
# main/nightly full-check runs or Mergify queue verification PR runs — Mergify
# can otherwise observe the cancelled run before the replacement run finishes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && !startsWith(github.head_ref, 'mergify/merge-queue/') }}

jobs:
  pr-body-lint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Accept Mergify queue metadata edit
        if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT == 'true' }}
        run: echo "Mergify queue metadata edit does not change the source under test."
      - uses: actions/checkout@v4
        if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        with:
          node-version: 24
      - name: Check bilingual PR body
        if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        env:
          PR_BODY: ${{ github.event.pull_request.body || '' }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref || '' }}
          PR_AUTHOR_LOGIN: ${{ github.event.pull_request.user.login || '' }}
        run: node tools/check-pr-body-bilingual.mjs --env PR_BODY
      - name: Check protected-surface governance declaration
        if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        env:
          PR_BODY: ${{ github.event.pull_request.body || '' }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref || '' }}
          PR_AUTHOR_LOGIN: ${{ github.event.pull_request.user.login || '' }}
        run: node tools/check-pr-governance.mjs --body-env PR_BODY --base-env PR_BASE_SHA --head-env PR_HEAD_SHA

  # Detect what a PR touched so heavy, package-scoped jobs can no-op their
  # expensive steps. The jobs still run and report green, so required-check
  # branch protection never deadlocks on a skipped context.
  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      gui: ${{ steps.filter.outputs.gui }}
    steps:
      - name: Accept Mergify queue metadata edit
        if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT == 'true' }}
        run: echo "Mergify queue metadata edit does not change the source under test."
      - uses: actions/checkout@v4
        if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
      - uses: dorny/paths-filter@v3
        if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        id: filter
        with:
          filters: |
            gui:
              - 'packages/gui/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'

  full-check:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [24, 26]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: git diff --check
      - run: sudo apt-get update && sudo apt-get install -y xvfb
      - run: npm run check
      - if: github.event_name == 'schedule'
        run: npm run harness:check-enforcement-debt-sunset

  typecheck:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [24, 26]
    steps:
      - name: Accept Mergify queue metadata edit
        if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT == 'true' }}
        run: echo "Mergify queue metadata edit does not change the source under test."
      - uses: actions/checkout@v4
        if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
      - uses: actions/setup-node@v4
        if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        run: npm ci
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        run: npm run typecheck

  fast-contract:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Accept Mergify queue metadata edit
        if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT == 'true' }}
        run: echo "Mergify queue metadata edit does not change the source under test."
      - uses: actions/checkout@v4
        if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
      - uses: actions/setup-node@v4
        if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        with:
          node-version: 24
          cache: npm
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        run: npm ci
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        run: npm run test:fast
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        run: npm run test:contract

  integration:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Accept Mergify queue metadata edit
        if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT == 'true' }}
        run: echo "Mergify queue metadata edit does not change the source under test."
      - uses: actions/checkout@v4
        if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
      - uses: actions/setup-node@v4
        if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        with:
          node-version: 24
          cache: npm
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        run: npm ci
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        run: npm run test:integration

  boundaries:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Accept Mergify queue metadata edit
        if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT == 'true' }}
        run: echo "Mergify queue metadata edit does not change the source under test."
      - uses: actions/checkout@v4
        if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
      - uses: actions/setup-node@v4
        if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        with:
          node-version: 24
          cache: npm
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        run: npm ci
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        run: npm run lint
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        run: npm run harness:check-import-boundaries
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        run: npm run harness:check-write-coordinator-boundary
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        run: npm run harness:check-bypass-write-boundary
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        run: npm run harness:check-kernel-dead-exports
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        run: npm run harness:check-relation-cycle-substrate
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        run: npm run harness:check-file-complexity
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        run: npm run harness:scan-forbidden-symbols
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        run: npm run harness:check-private-boundary
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        run: npm run harness:check-gate-surface
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        run: npm run harness:check-runtime-release-readiness
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        run: npm run harness:check-implementation-contracts
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        run: npm run harness:check-schema-contracts
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        run: npm run harness:check-legacy-intake-readiness

  package-policy:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Accept Mergify queue metadata edit
        if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT == 'true' }}
        run: echo "Mergify queue metadata edit does not change the source under test."
      - uses: actions/checkout@v4
        if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
      - uses: actions/setup-node@v4
        if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        with:
          node-version: 24
          cache: npm
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        run: npm ci
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        run: npm run harness:check-package-policy
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        run: npm run harness:smoke-cli-package

  supply-chain:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Accept Mergify queue metadata edit
        if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT == 'true' }}
        run: echo "Mergify queue metadata edit does not change the source under test."
      - uses: actions/checkout@v4
        if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
      - uses: actions/setup-node@v4
        if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        with:
          node-version: 24
          cache: npm
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        run: npm ci
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        run: npm run harness:check-supply-chain

  gui-build:
    if: github.event_name == 'pull_request'
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Accept Mergify queue metadata edit
        if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT == 'true' }}
        run: echo "Mergify queue metadata edit does not change the source under test."
      - uses: actions/checkout@v4
        if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
      - uses: actions/setup-node@v4
        if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        with:
          node-version: 24
          cache: npm
      # Skip the GUI build/test when a PR touches no GUI or shared-root files.
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' && needs.changes.outputs.gui == 'true' }}
        run: npm ci
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' && needs.changes.outputs.gui == 'true' }}
        run: npm run test:gui
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' && needs.changes.outputs.gui == 'true' }}
        run: npm run -w @harness-anything/gui build

  gui-e2e:
    if: github.event_name == 'pull_request'
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Accept Mergify queue metadata edit
        if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT == 'true' }}
        run: echo "Mergify queue metadata edit does not change the source under test."
      - uses: actions/checkout@v4
        if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
      - uses: actions/setup-node@v4
        if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        with:
          node-version: 24
          cache: npm
      # Skip the Electron E2E smoke when a PR touches no GUI or shared-root files.
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' && needs.changes.outputs.gui == 'true' }}
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' && needs.changes.outputs.gui == 'true' }}
        run: npm ci
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' && needs.changes.outputs.gui == 'true' }}
        run: npm run test:gui:e2e

  node26-compatibility:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Accept Mergify queue metadata edit
        if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT == 'true' }}
        run: echo "Mergify queue metadata edit does not change the source under test."
      - uses: actions/checkout@v4
        if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
      - uses: actions/setup-node@v4
        if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        with:
          node-version: 26
          cache: npm
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        run: npm ci
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        run: npm run typecheck
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        run: npm run test:fast
      - if: ${{ env.MERGIFY_QUEUE_METADATA_EDIT != 'true' }}
        run: npm run test:contract
