name: rewrite-ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 19 * * *"

# Cancel superseded PR runs (e.g. after a force-push). Never cancel main/nightly
# full-check runs — those must always complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Detect what a PR touched so heavy, package-scoped jobs can no-op their
  # expensive steps. The jobs still run and report green, so required-check
  # branch protection never deadlocks on a skipped context.
  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      gui: ${{ steps.filter.outputs.gui }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            gui:
              - 'packages/gui/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'

  full-check:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [24, 26]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: git diff --check
      - run: npm run check

  typecheck:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [24, 26]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  fast-contract:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:fast
      - run: npm run test:contract

  integration:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:integration

  boundaries:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run harness:check-import-boundaries
      - run: npm run harness:check-file-complexity
      - run: npm run harness:scan-forbidden-symbols
      - run: npm run harness:check-private-boundary
      - run: npm run harness:check-runtime-release-readiness
      - run: npm run harness:check-implementation-contracts
      - run: npm run harness:check-schema-contracts
      - run: npm run harness:check-legacy-intake-readiness

  package-policy:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run harness:check-package-policy
      - run: npm run harness:smoke-cli-package

  supply-chain:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run harness:check-supply-chain

  gui-build:
    if: github.event_name == 'pull_request'
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      # Skip the GUI build/test when a PR touches no GUI or shared-root files.
      - if: needs.changes.outputs.gui == 'true'
        run: npm ci
      - if: needs.changes.outputs.gui == 'true'
        run: npm run test:gui
      - if: needs.changes.outputs.gui == 'true'
        run: npm run -w @harness-anything/gui build

  node26-compatibility:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:fast
      - run: npm run test:contract
